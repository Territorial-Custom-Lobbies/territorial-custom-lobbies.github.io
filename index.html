<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8"/>
    <title>Territorial.io</title>
    <meta name="description" content="Territorial.io - The Art of Conquest">
    <meta name="keywords" content="territorial.io, territorial, territorial game, conquest game, conquer game, territory game">
    <meta name="author" content="David Tschacher">
    <meta name="viewport" content="width=device-width, maximum-scale=1">
    <style>
      html, body {
        overflow: hidden;
        padding: 0;
        margin: 0;
        background: black;
        color: white;
      }

      * {
        box-sizing: border-box;
      }

      a {
        color: rgb(225, 225, 255);
      }
      .input-container {
            position: absolute;
            text-align: center;
            width: 225px;
            margin: auto;
            bottom: 10px;
            right: 10px;
            /* transform: translate(-50%, -50%); */
            background-color: rgb(240, 240, 240);
            padding: 10px 20px;
            border-radius: 10px;
        }
        .input-container input {
            display: block;
            width: 100%;
            margin-bottom: 10px;
            font-size: 1em;
            border: inherit;
            font: inherit;
            color: inherit;
            background-color: inherit;
            user-select: none;
            outline: none;
            resize: none;
        }
        .hidden {
            display: none !important;
        }
    </style>
  </head>
  <body>
    <canvas id="canvasA" width="128" height="128"></canvas>
    <script src="main.js"></script>
    <script src="createLobby.js"></script>
  </body>
</html>
